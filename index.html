<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackaton</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="larry-section">

        <article class="larry-img">
            <img src="https://media.tenor.com/BfwjGMwp30oAAAAm/evil-larry-larry.webp" alt="" srcset="">

        </article>

        <!-- PARTE DO DIALOGO DO LARRY -->
        <article class="larry-dialogue">
            <p class="larry-dialogue-text" id="typingText"></p>

            <div class="input-container">
                <div class="input-container-item">
                    <label for="nome">Nome</label>
                    <input type="text" name="nome" id="nome">
                </div>
                <div class="input-container-item">
                    <label for="telefone">Telefone</label>
                    <input type="text" name="telefone" id="telefone">
                </div>
                <div class="input-container-button">
                    <button type="button">Acessar</button>
                </div>
            </div>

        </article>

    </section>
    <script src="script.js" defer></script>

</body>

</html>
